<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thapar Institute — Interactive Campus Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="page-header">
    <span class="eyebrow">Thapar Institute of Engineering &amp; Technology</span>
    <h1>Campus Map</h1>
    <p class="subhead">Hover a marker for a quick look, click it to open the full record.</p>
  </header>

  <main class="map-shell">
    <div class="map-frame" id="mapFrame">
      <img src="campus-map.jpg" alt="Thapar Institute campus map" class="map-image" draggable="false">

      <!-- ============================================================
           LOCATION MARKERS are injected here by script.js at runtime,
           one <button class="marker"> per entry in the LOCATIONS array.
           Nothing to edit in this file to add a new block — see the
           LOCATIONS array at the top of script.js instead.
      ============================================================= -->
    </div>
  </main>

  <!-- Hover tooltip (single shared element, repositioned by JS) -->
  <div class="tooltip" id="tooltip" role="status">
    <span class="tooltip-name" id="tooltipName"></span>
    <span class="tooltip-hint">click for details</span>
  </div>

  <!-- Detail modal (single shared element, filled by JS) -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
      <div class="modal-media">
        <img id="modalImage" src="" alt="">
      </div>
      <div class="modal-body">
        <span class="modal-eyebrow" id="modalEyebrow"></span>
        <h2 id="modalTitle"></h2>
        <p id="modalDescription"></p>
        <dl class="modal-facts" id="modalFacts"></dl>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
